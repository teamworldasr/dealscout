<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealScout - Find Cheaper Alternatives</title>
    <style>
        :root {
            --primary: #007bff;
            --dark: #1a1a1a;
            --bg: #f8f9fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
        }

        header {
            background: white;
            padding: 1rem 5%;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: bold; font-size: 1.5rem; }
        .logo span { color: var(--primary); }

        .hero {
            text-align: center;
            padding: 50px 5%;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .hero h1 span { color: var(--primary); }
        .hero p { color: #666; font-size: 1rem; }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        #products-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .image-container {
            position: relative;
            height: 200px;
            background: #f1f1f1;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
        }

        .category-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,123,255,0.9);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--dark);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .store-name {
            color: #888;
            font-size: 0.82rem;
            margin-bottom: 12px;
        }

        .current-price {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--dark);
            display: block;
            margin-bottom: 10px;
        }

        .description {
            font-size: 0.85rem;
            color: #666;
            line-height: 1.5;
            margin-bottom: 18px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        .view-deal-btn {
            background: var(--dark);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }

        .view-deal-btn:hover { background: #333; }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px;
            font-size: 1.1rem;
            color: #888;
        }

        .error-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #e74c3c;
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 1.8rem; }
            #products-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Deal<span>Scout</span></div>
    </header>

    <section class="hero">
        <h1>Find <span>Cheaper</span> Alternatives</h1>
        <p>Real-time deals — updated live from our database</p>
    </section>

    <div class="container">
        <div id="products-container">
            <div class="loading">⏳ Fetching fresh deals...</div>
        </div>
    </div>

    <script>
        var SUPABASE_URL = "https://nquwvshatohcwwjqgfyx.supabase.co";
        var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xd3V2c2hhdG9oY3d3anFnZnl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODQ0NzAsImV4cCI6MjA5MTg2MDQ3MH0.n3v26lqAO5ZStetI0NsLyN9QfMhpYfRr6O02bUyedsE";

        function fetchProducts() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "https://nquwvshatohcwwjqgfyx.supabase.co/rest/v1/products?select=*", true);
            xhr.setRequestHeader("apikey", SUPABASE_KEY);
            xhr.setRequestHeader("Authorization", "Bearer " + SUPABASE_KEY);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var products = JSON.parse(xhr.responseText);
                    renderProducts(products);
                } else {
                    showError("Server returned: " + xhr.status);
                }
            };
            xhr.onerror = function() {
                showError("Network error. Check your internet connection.");
            };
            xhr.send();
        }

        function renderProducts(products) {
            var container = document.getElementById("products-container");
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="error-msg">No products found in database yet.</div>';
                return;
            }
            container.innerHTML = "";
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                var card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML =
                    '<div class="image-container">' +
                        '<img src="' + (p.image1 || "https://placehold.co/400x300?text=No+Image") + '" alt="' + p.name + '" onerror="this.src=\'https://placehold.co/400x300?text=No+Image\'">' +
                        '<span class="category-tag">' + (p.category || "Deal") + '</span>' +
                    '</div>' +
                    '<div class="card-content">' +
                        '<h3 class="product-name">' + p.name + '</h3>' +
                        '<p class="store-name">via ' + (p.store || "Online Store") + '</p>' +
                        '<span class="current-price">' + (p.price || "N/A") + '</span>' +
                        '<p class="description">' + (p.description || "") + '</p>' +
                        '<a href="' + p.affiliate_link + '" target="_blank" class="view-deal-btn">VIEW DEAL</a>' +
                    '</div>';
                container.appendChild(card);
            }
        }

        function showError(msg) {
            document.getElementById("products-container").innerHTML =
                '<div class="error-msg"><p>Error: ' + msg + '</p><small>Check Supabase RLS policy and table name.</small></div>';
        }

        fetchProducts();
    </script>
</body>
</html>
