<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealScout - Instant Load</title>
    <style>
        :root {
            --primary: #007bff;
            --dark: #1a1a1a;
            --bg: #f8f9fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
        }

        /* Nav & Hero */
        header {
            background: white;
            padding: 1rem 5%;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero {
            text-align: center;
            padding: 50px 5%;
            background: white;
        }

        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .hero span { color: var(--primary); }

        /* Grid */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        #products-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Card Styling to match your vibe */
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover { transform: translateY(-5px); }

        .image-container {
            position: relative;
            height: 200px;
            background: #f1f1f1;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .category-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,123,255,0.9);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 1.1rem;
            margin: 0 0 5px 0;
            color: var(--dark);
        }

        .store-name {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .price-section {
            margin-bottom: 15px;
        }

        .current-price {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--dark);
        }

        .description {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.4;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .view-deal-btn {
            background: var(--dark);
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: auto;
        }

        .view-deal-btn:hover { background: #333; }

        /* Loading Skeleton */
        .loading {
            text-align: center;
            padding: 100px;
            font-size: 1.2rem;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; font-size: 1.5rem;">Deal<span style="color:#007bff">Scout</span></div>
    </header>

    <section class="hero">
        <h1>Find <span>Cheaper</span> Alternatives</h1>
        <p>Real-time deals powered by Supabase</p>
    </section>

    <div class="container">
        <div id="products-container">
            <div class="loading">Fetching fresh deals...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://nquwvshatohcwwjqgfyx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xd3V2c2hhdG9oY3d3anFnZnl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODQ0NzAsImV4cCI6MjA5MTg2MDQ3MH0.n3v26lqAO5ZStetI0NsLyN9QfMhpYfRr6O02bUyedsE";

        async function fetchProducts() {
            try {
                // Fetching from your table 'products'
                const response = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*&order=created_at.desc`, {
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) throw new Error("Connection failed");
                const products = await response.json();
                renderProducts(products);
            } catch (error) {
                console.error("API Error:", error);
                document.getElementById('products-container').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; color: red;">
                        <p>Error connecting to database.</p>
                        <small>Make sure your Table is named 'products' and RLS Read Policy is ENABLED.</small>
                    </div>`;
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            if (!products || products.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center;">No products found yet. Add some to your Supabase table!</div>';
                return;
            }

            container.innerHTML = '';

            products.forEach(p => {
                const card = `
                    <div class="product-card">
                        <div class="image-container">
                            <img src="${p.image1 || 'https://placehold.co/400x300?text=No+Image'}" alt="${p.name}">
                            <span class="category-tag">${p.category || 'Deal'}</span>
                        </div>
                        <div class="card-content">
                            <h3 class="product-name">${p.name}</h3>
                            <p class="store-name">via ${p.store || 'Online Store'}</p>
                            <div class="price-section">
                                <span class="current-price">${p.price || 'N/A'}</span>
                            </div>
                            <p class="description">${p.description || ''}</p>
                            <a href="${p.affiliate_link}" target="_blank" class="view-deal-btn">VIEW DEAL</a>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Run instantly
        fetchProducts();
    </script>1
</body>
</html>
